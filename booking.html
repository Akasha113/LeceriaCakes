  <div class="content">
    <div class="h1"><h1>Book Your Cake with Leceria</h1></div>
    <form class="form" id="cake-booking-form">
      <div class="form-container">

        <div class="form-control">
          <label for="name">Name</label>
          <input type="text" id="name" name="name" placeholder="Your Full Name" required>
        </div>

        <div class="form-control">
          <label for="contact">Contact Number</label>
          <input type="tel" id="contact" name="contact" placeholder="03XXXXXXXXX" required>
        </div>

        <div class="form-control">
          <label for="cake-flavor">Cake Flavor</label>
          <select id="cake-flavor" name="cake-flavor" required>
            <option value="">-- Select Flavor --</option>
            <option value="chocolate">Chocolate cake</option>
            <option value="vanilla">Cream Cake</option>
            <option value="red-velvet">Donut</option>
            <option value="red-velvet">Birthday Cake</option>
            <option value="red-velvet">IceCream Cake</option>
            <option value="strawberry">Strawberry Cake Slice</option>
          </select>
        </div>

        <div class="form-control">
          <label for="cake-size">Cake Size</label>
          <select id="cake-size" name="cake-size" required>
            <option value="">-- Select Size --</option>
            <option value="1lb">1 lb</option>
            <option value="2lb">2 lb</option>
            <option value="3lb">3 lb</option>
            <option value="custom">Custom</option>
          </select>
        </div>

        <div class="form-control">
          <label for="delivery-date">Delivery Date</label>
          <input type="date" id="delivery-date" name="delivery-date" required>
        </div>
         <div class="form-control">
          <label for="address"> Your Address</label>
          <input type="text" id="address" name="Address" required>
        </div>

        <div class="form-control">
          <label for="message">Custom Message on Cake</label>
          <textarea id="message" name="message" rows="4" placeholder="e.g., Happy Birthday, Sarah!" maxlength="100"></textarea>
        </div>

      </div>

      <div class="btn-container">
        <button class="button" type="submit">Confirm Order</button>
      </div>
    </form>

    <div id="result"></div>
