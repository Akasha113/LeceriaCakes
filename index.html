<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css"
    rel="stylesheet"
  /><link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/solid.min.css" integrity="sha512-DzC7h7+bDlpXPDQsX/0fShhf1dLxXlHuhPBkBo/5wJWRoTU6YL7moeiNoej6q3wh5ti78C57Tu1JwTNlcgHSjg==" crossorigin="anonymous" referrerpolicy="no-referrer" />

  <style>
    body{
   
    background-color: #F6F2E7;
    display: flex;
   justify-content: center;
   align-items: center;
   min-height: 100vh;
}
.container{
  margin: 20px ;

 overflow: hidden;
  position: relative;
  width: 850px;
  height: 550px;
  background-color: #dfddd5;
  border-radius: 30px;
  box-shadow:  0 0 30px #F6F2E7;
}
.login-form{
  transition: .6s ease-in-out 1.2s, visibility 0s 1s;
position: absolute;
right: 0;
width: 50%;
height: 100%;
background-color: #dfddd5;
display: flex;
align-items: center;
color: #BD7D58;
text-align: center;
padding: 40px;
z-index: 1;
}
.container.active .login-form{
  right: 50%;
}

 .register-form{
  visibility: hidden;
}
.container.active .login-form.register-form{
  visibility: visible;
}
form{
 width: 100%;
}
.login h1{
  font-size: 36px;
  margin: -10px 0;
}
.input-box{
  position: relative;
  margin: 30px 0;
}
.input-box input{
  width: 100%;
  padding: 13px 50px 13px 20px ;
  background-color: #F6F2E7;
  border-radius: 8px;
  border: none;
  outline: none;
  font-size: 16px;
  color: #333;
  font-weight: 500;
}
.input-box input::placeholder{
  color: #888;
  font-weight: 400;
}
.input-box i{
  position: absolute;
  right: 20px;
  top: 50%;
  transform: translateY(-50%);
  font-size: 20px;
  color: #888;
}
.forget-link{
  margin: -15px 0 15px;
}
.forget-link a{
  font-size: 14.5px;
  color: #333;
  text-decoration: none;
}
.btn{
  width: 100%;
  height: 48px;
  border-radius: 8px;
  border: none;
  cursor: pointer;
  font-size: 16px;
  color: #F6F2E7;
  background-color: #BD7D58;
}


.toggle-box{
  position: absolute;
  width: 100%;
  height: 100%;
  

}
.toggle-box::before{
  content: '';
  position: absolute;
  width: 300%;
  height: 100%;
  background: #BD7D58;
 

  z-index: 2;
  left: -250%;
  border-radius: 150px;
  transition: 1.8s ease-in-out;
}
.container.active .toggle-box::before{
  left: 50%;
}
.toggle-panel{
  position: absolute;
  width: 50%;
  height: 100%;
  color: #F6F2E7;
  /* background-color: #BD7D58; */
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  z-index: 2;
  transition: .6s ease-in-out;

}
.toggle-panel.toggle-left{
 left: 0;
transition-delay:1.2s ;
}
.container.active .toggle-panel.toggle-left{
  left: -50%;
  transition-delay: .6s;
}
.toggle-panel.toggle-right{
  right: -50%;
   transition-delay: .6s;

}
.container.active .toggle-panel.toggle-right{
  right: 0;
  transition-delay:1.2s ;
}
.toggle-panel p{
  margin-bottom: 20px;
}
.toggle-panel .btn{
  width: 160px;
  height: 46px;
  background: transparent;
  border: 2px solid #F6F2E7;
  box-shadow: none;

}
/* responsive */
@media screen and (max-width:650px){
  .container{
    height: calc(100vh - 20px);
    

  }
  .login-form{
    width: 100%;
    height: 70%;
    bottom: 0;

  }
  .login-form .register-form{
    width: 100%;
    height: 70%;
    bottom: 0;

  }
  
  .container.active .login-form{
    left: 0;
    right: 0;
bottom: 30%;
  }
  .toggle-box::before{
    left: 0;
    width: 100%;
    height: 300%;
    top: -270%;
    border-radius: 20vw;

  }
  .container.active .toggle-box::before{
    left: 0%;
font-size: 20px;
    top: 70%;
  }
  .toggle-panel{

    width: 100%;
    height: 30%;
  }
  .toggle-panel.toggle-left{
    top: 0;

  }
  .container.active .toggle-panel.toggle-left{
    left: 0;
    top: -30%;
  }
  .toggle-panel.toggle-right{
    right: 0;
    bottom: -30%;

  }
  .container.active .toggle-panel.toggle-right{
    bottom: 0;

  }
}
@media screen and (max-width:400px){
  .login-form{
    padding: 20px;
  }
  .toggle-panel h1{
    font-size: 30px;
  }
}

  </style>
  <title>Leceria Cakes</title>

</head>
<body>


<div class="container">
   <div class="login-form">
    <form action="">
        <h1>Login</h1>
        <div class="input-box">
            <input type="text" placeholder="UserName" required>
<i class="fas fa-user"></i>
        </div>  <div class="input-box">
            <input type="password" placeholder="Password" required>
                  <i class="fas fa-lock"></i>
        </div>
        <div class="forget-link">
            <a href="">Forget password</a>
        </div>
        <button type="submit" class="btn">Login</button>
      
       
    </form>
   </div>
    <div class="login-form register-form">
    <form action="">
        <h1>Register</h1>
        <div class="input-box">
            <input type="text" placeholder="UserName" required>
<i class="fas fa-user"></i>
        </div>  
         <div class="input-box">
            <input type="email" placeholder="Email" required>
<i class="fas fa-envelope"></i>
        </div>  
        <div class="input-box">
            <input type="password" placeholder="Password" required>
                  <i class="fas fa-lock"></i>
        </div>
        
        <button type="submit" class="btn">Register</button>
        
        
    </form>
   </div>
   <div class="toggle-box">
    <div class="toggle-panel toggle-left">
      <h1>Hello, Welcome!</h1>
      <p>Don't have an account</p>
      <button class="btn register-btn">
 Register
      </button>
    </div>
     <div class="toggle-panel toggle-right">
      <h1> Welcome Back!</h1>
      <p>Already have an account</p>
      <button class="btn login-btn">
 Login
      </button>
    </div>
   </div>
</div>

<!-- Message Modal -->
<div class="modal fade" id="messageModal" tabindex="-1" aria-labelledby="messageModalLabel" aria-hidden="true">
  <div class="modal-dialog">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title" id="messageModalLabel">Message</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
      </div>
      <div class="modal-body" id="modalMessage">
        <!-- Message will be inserted here -->
      </div>
      <div class="modal-footer">
        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Close</button>
      </div>
    </div>
  </div>
</div>

<script src="script.js"></script>

</body>
</html>
